<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<!-- viewport-fit=cover + user-scalable=no: pantalla completa real en móvil y sin
     zoom accidental que mete latencia/saltos durante el juego -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#4ec0f0" />
<title>Danny Bird</title>
<meta name="description" content="Danny Bird — un Flappy con Danny. Tap para volar, esquiva los tubos." />

<!-- PWA / instalable -->
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/favicon.png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Danny Bird" />

<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- un solo canvas: todo el render del juego va aquí (mínimo overhead de DOM) -->
  <canvas id="game" aria-label="Danny Bird — juego. Toca o presiona espacio para volar."></canvas>
  <noscript>Activa JavaScript para jugar Danny Bird.</noscript>

  <!-- Overlay de Game Over: score + entrada de nombre (5) + ranking global + reintentar.
       En HTML (no canvas) para tener input nativo de teclado y lista scrolleable. -->
  <div id="over" class="over hidden" aria-hidden="true">
    <div class="over-card">
      <div id="ovTitle" class="over-title">GAME OVER</div>
      <div id="ovScores" class="over-scores">
        <div class="over-stat"><span class="over-lbl">SCORE</span><span id="ovScore" class="over-num">0</span></div>
        <div class="over-stat"><span class="over-lbl">MEJOR</span><span id="ovBest" class="over-num">0</span></div>
      </div>
      <div id="ovNewbest" class="over-newbest hidden">¡NUEVO RÉCORD!</div>

      <div id="ovEntry" class="over-entry">
        <input id="ovName" class="over-input" maxlength="5" placeholder="NOMBRE"
               autocomplete="off" autocapitalize="characters" autocorrect="off" spellcheck="false"
               aria-label="Tu nombre, máximo 5 letras" />
        <button id="ovSave" class="over-btn" type="button">GUARDAR</button>
      </div>
      <div id="ovMsg" class="over-msg hidden"></div>

      <div class="over-lb-title">🏆 RANKING GLOBAL</div>
      <ol id="ovLb" class="over-lb"><li class="over-lb-loading">cargando…</li></ol>

      <button id="ovRetry" class="over-btn over-btn-primary" type="button">JUGAR DE NUEVO</button>
    </div>
  </div>

  <script src="game.js"></script>
  <script>
    // Service worker: registro best-effort, no bloquea el juego si falla.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((e) =>
          console.warn('[sw] registro falló:', e && e.message)
        );
      });
    }
  </script>
</body>
</html>
